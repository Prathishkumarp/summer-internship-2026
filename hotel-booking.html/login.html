<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Hotel Booking System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600')
    center/cover;
}

.login-container{
    width:400px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.3);
}

.login-container h2{
    text-align:center;
    color:#0f172a;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    background:#38bdf8;
    color:white;
    font-size:16px;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}

.btn:hover{
    background:#0284c7;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

.register-link a{
    text-decoration:none;
    color:#0284c7;
}

</style>
</head>
<body>

<div class="login-container">

    <h2>Hotel Booking Login</h2>

    <form>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter Email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password">
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="register-link">
            Don't have an account?
            <a href="register.html">Register</a>
        </div>

    </form>

</div>

</body>
</html>
