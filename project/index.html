<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: #0f172a;
            color: white;
        }

        .navbar h1 {
            font-size: 22px;
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background: url('https://i.pinimg.com/1200x/7c/6c/5c/7c6c5cdb3979e2b4bcbebb538fd1757b.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h2 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            background: #38bdf8;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .hero button:hover {
            background: #0ea5e9;
        }

        /* Features */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 50px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* Footer */
        footer {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>🏨 Hotel Booking</h1>
        <div>
            <a href="#">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <h2>Find Your Perfect Stay</h2>
        <p>Book hotels easily, quickly, and securely anytime</p>
        <button onclick="window.location.href='login.html'">Get Started</button>
    </div>

    <!-- Features Section -->
    <div class="features">
        <div class="card">
            <h3>🔥 Best Hotels</h3>
            <p>Choose from top-rated hotels</p>
        </div>

        <div class="card">
            <h3>⚡ Fast Booking</h3>
            <p>Instant booking system</p>
        </div>

        <div class="card">
            <h3>🔒 Secure System</h3>
            <p>Your data is safe with us</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Hotel Booking System | Designed by Prathish</p>
    </footer>

</body>
</html>
