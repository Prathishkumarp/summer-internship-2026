<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Block vs Inline Elements</title>
</head>
<body>

    <h2>Block Elements (div)</h2>

    <div style="background-color: rgb(255, 235, 10);">
        Div Element 1
    </div>

    <div style="background-color: rgb(0, 4, 255);">
        Div Element 2
    </div>

    <div style="background-color: lightcoral;">
        Div Element 3
    </div>

    <hr>

    <h2>Inline Elements (span)</h2>

    <span style="background-color: yellow;">
        Span 1
    </span>

    <span style="background-color: orange;">
        Span 2
    </span>

    <span style="background-color: pink;">
        Span 3
    </span>

</body>
</html>
</body>
</html>
