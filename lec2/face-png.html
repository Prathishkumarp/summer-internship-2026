<!DOCTYPE html>
<html>
<head>
<style>
.face{
    width:200px;
    height:200px;
    background:yellow;
    border-radius:50%;
    position:relative;
}

.eye{
    width:20px;
    height:20px;
    background:black;
    border-radius:50%;
    position:absolute;
}

.left{
    top:50px;
    left:50px;
}

.right{
    top:50px;
    right:50px;
}

.mouth{
    width:100px;
    height:50px;
    border-bottom:5px solid black;
    position:absolute;
    left:50px;
    top:100px;
}
</style>
</head>
<body>

<div class="face">
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
</div>

</body>
</html>
