<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Amazon Navbar</title>

    <style>
        body{
            margin:0;
        }

        .navbar{
            background-color:black;
            padding:15px;
            display:flex;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:25px;
            font-weight:bold;
            margin-right:20px;
        }

        .search{
            width:300px;
            padding:5px;
        }

        .cart{
            margin-left:20px;
            padding:5px 10px;
        }

        .signin{
            margin-left:10px;
            padding:5px 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">

          <div class="logo">Amazon.com</div>

        <input type="text" placeholder="Search Products you wish to buy" class="search">

        <button class="cart">Cart</button>

        <button class="signin">Sign In or Register</button>

    </div>

</body>
</html>
</body>
</html>
